name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore SunroomCrm.Blazor.sln

      - name: Check code formatting
        run: dotnet format SunroomCrm.Blazor.sln --verify-no-changes --verbosity diagnostic

      - name: Build
        run: dotnet build SunroomCrm.Blazor.sln --no-restore --configuration Release

  unit-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint-and-build
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore SunroomCrm.Blazor.sln

      - name: Build
        run: dotnet build SunroomCrm.Blazor.sln --no-restore --configuration Release

      - name: Test with coverage
        run: >
          dotnet test SunroomCrm.Blazor.Tests/SunroomCrm.Blazor.Tests.csproj
          --no-build
          --configuration Release
          --settings coverlet.runsettings
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults
          --logger "trx;LogFileName=test-results.trx"

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate coverage report
        run: >
          reportgenerator
          -reports:./TestResults/**/coverage.cobertura.xml
          -targetdir:./TestResults/CoverageReport
          -reporttypes:"Html;MarkdownSummaryGithub;Cobertura;TextSummary"

      - name: Display coverage summary
        run: cat ./TestResults/CoverageReport/Summary.txt

      - name: Append coverage to job summary
        run: cat ./TestResults/CoverageReport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - name: Check coverage gate (100%)
        run: |
          COVERAGE=$(grep "Line coverage" ./TestResults/CoverageReport/Summary.txt | grep -oP '[\d.]+(?=%)' | head -1)
          echo "Line coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 100" | bc -l) )); then
            echo "Coverage ${COVERAGE}% is below the 100% threshold"
            exit 1
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./TestResults
          retention-days: 14

  e2e-tests:
    name: Playwright E2E (mocked)
    runs-on: ubuntu-latest
    needs: lint-and-build
    timeout-minutes: 30
    if: ${{ vars.RUN_E2E == 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore SunroomCrm.Blazor.sln

      - name: Build
        run: dotnet build SunroomCrm.Blazor.sln --no-restore --configuration Release

      - name: Install Playwright browsers
        run: pwsh SunroomCrm.Blazor.Tests.E2E/bin/Release/net8.0/playwright.ps1 install --with-deps

      - name: Run E2E tests
        run: >
          dotnet test SunroomCrm.Blazor.Tests.E2E/SunroomCrm.Blazor.Tests.E2E.csproj
          --no-build
          --configuration Release
          --logger "trx;LogFileName=e2e-results.trx"
          --results-directory ./E2EResults

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-mocked
          path: ./E2EResults
          retention-days: 14

  e2e-integration:
    name: E2E Integration (Docker)
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 45
    if: ${{ vars.RUN_E2E == 'true' }}
    env:
      SA_PASSWORD: ${{ secrets.SA_PASSWORD }}

    steps:
      - name: Checkout Blazor repo
        uses: actions/checkout@v4

      - name: Checkout .NET API repo
        uses: actions/checkout@v4
        with:
          repository: rvnminers-A-and-N/sunroom-crm-dotnet
          path: dotnet-api

      - name: Start .NET API via docker-compose
        working-directory: dotnet-api
        run: docker compose up -d --build

      - name: Wait for .NET API to be ready
        run: |
          for i in $(seq 1 60); do
            if curl -s -o /dev/null --max-time 3 http://localhost:5236/; then
              echo ".NET API is ready"
              exit 0
            fi
            sleep 3
          done
          echo ".NET API failed to start"
          docker compose -f dotnet-api/docker-compose.yml logs
          exit 1

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore SunroomCrm.Blazor.sln

      - name: Build
        run: dotnet build SunroomCrm.Blazor.sln --no-restore --configuration Release

      - name: Install Playwright browsers
        run: pwsh SunroomCrm.Blazor.Tests.E2E/bin/Release/net8.0/playwright.ps1 install --with-deps

      - name: Run E2E tests against .NET API
        env:
          BLAZOR_E2E_API_URL: http://localhost:5236
        run: >
          dotnet test SunroomCrm.Blazor.Tests.E2E/SunroomCrm.Blazor.Tests.E2E.csproj
          --no-build
          --configuration Release
          --logger "trx;LogFileName=e2e-integration-results.trx"
          --results-directory ./E2EIntegrationResults

      - name: Upload E2E integration results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-integration
          path: ./E2EIntegrationResults
          retention-days: 14

      - name: Stop API containers
        if: always()
        working-directory: dotnet-api
        run: docker compose down -v
